<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="product.css">
    <link rel="icon" href="images2/logoTransparent.png">
    <script src="https://kit.fontawesome.com/b125d720ee.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
    /*price styling*/  

.product-price {
font-size: 16px;
display: flex;
justify-content: center;
align-items: center;
gap: 10px;
}

.original-price {
  text-decoration: line-through;

}

.discount-price {
  font-size: 18px;
  color: rgb(16, 4, 4)
}

.discount-percent {
  font-size: 14px;
  background-color: green;
  padding: 2px 8px;
  border-radius: 4px;
  font-weight: bold;
}

.cart-button {
 
  background-color: green;
  color: yellow;
  font-size: 14px;
}
    </style>
</head>
<body>
    <section>

        <header>

            <span>Crystal & Pure</span>

            <div>
                <button onclick="navigateTo('home')">Home</button>
                <button onclick="navigateTo('blog')">Blog</button>
                <button onclick="navigateTo('product')">Product</button>
                <button onclick="navigateTo('about')">About Us</button>
                <button onclick="navigateTo('research')">Research</button>
            </div>

            <div id="nav_right">

                <i class="fa-solid fa-user"></i>


            </div>
        </header>

    </section>

    <section id="main_container_section">

        <div class="container">
            
            <div class="boxs">
                <img src="./images2/Binbond.jpg" alt="image.jpg" class="product-image">
                <i class="fa fa-heart-o" onclick="changeColor(this)"></i>
                <h2 class="product-name" align="center">BinBond</h2>
                <p class="product-description">This is a brief description of the product.</p>
                 <p class="product-description">It highlights the key features and uses</p>
                <div class="product-price">
                  <span class="original-price">$6000</span>
                  <span class="discount-price">$4700</span>
                  <span class="discount-percent">20% off</span>
                </div>
                <div class="cart-button">
                    <p align="cent.er">Add to cart</p>
                  </div>
            </div>
            <div class="boxs">
                <img src="./images2/citizen.jpeg" alt="image.jpg" class="product-image">
                <i class="fa fa-heart-o" onclick="changeColor(this)"></i>
                <h2 class="product-name" align="center">Citizen</h2>
                <p class="product-description">This is a brief description of the product.</p>
                 <p class="product-description">It highlights the key features and uses</p>
                <div class="product-price">
                  <span class="original-price">$4000</span>
                  <span class="discount-price">$3800</span>
                  <span class="discount-percent">10% off </span>
                </div>
                <div class="cart-button">
                  <p align="center">Add to cart</p>
                </div>

            

    <script src="product.js"></script>
